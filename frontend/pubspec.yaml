name: car_ai_diagnosis
description: تطبيق تشخيص السيارات الذكي بالذكاء الاصطناعي
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  url_launcher: ^6.3.1
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter
  http: ^1.2.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.6
  speech_to_text: ^7.4.0
  shared_preferences: ^2.5.5
  share_plus: ^13.2.0
  pdf: ^3.13.0
  barcode: ^2.2.9
  printing: ^5.15.0
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_blue_classic: ^0.1.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSansArabic-Regular.ttf
    - assets/data/obd_codes.json
    - assets/icon/icon.png
    - assets/icon/icon_mark.png
  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
